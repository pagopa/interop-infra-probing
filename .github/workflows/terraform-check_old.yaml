name: Terraform Checks (obsolete)
run-name: "Terraform Checks - ${{ github.ref_name }}"

on:
  pull_request:
    #paths:
    #  - "src/**"

env:
  TFLINT_VERSION: "v0.61.0"
  TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
  TFLINT_PLUGIN_DIR: ${{ github.workspace }}/.tflint.d/plugins

permissions:
  contents: read

jobs:
  discover-modules:
    name: Discover Terraform States
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build Terraform state matrix
        id: build-matrix
        run: |
          set -euo pipefail
 
          matrix_entries="[]"

          while IFS= read -r env_dir; do
            state_dir=$(dirname "$env_dir")

            # Local modules are consumed by a parent state and should not be
            # initialized or validated as standalone Terraform roots.
            case "$state_dir" in
              */modules/*) continue ;;
            esac

            # A Terraform state root in this repository has an env/ folder
            # with per-environment tfvars, plus Terraform files next to it.
            if [ -z "$(find "$state_dir" -maxdepth 1 -type f -name '*.tf' -print -quit)" ]; then
              continue
            fi

            if [ -z "$(find "$env_dir" -mindepth 2 -maxdepth 2 -type f \( -name 'terraform.tfvars' -o -name 'backend.tfvars' \) -print -quit)" ]; then
              continue
            fi

            state_name=$(echo "$state_dir" | sed 's#^\./##; s#^src/##; s#/#-#g')

            matrix_entries=$(echo "$matrix_entries" | jq -c \
                --arg path "$state_dir" \
                --arg name "$state_name" \
                '. + [{"path": $path, "name": $name }]')

          done < <(find src -type d -name env | sort)
          
          echo "matrix={\"include\":$(echo "$matrix_entries")}" >> "$GITHUB_OUTPUT"

  terraform-checks:
    name: "[${{ matrix.name }}] Terraform Checks"
    needs: [discover-modules]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-modules.outputs.matrix) }}
      max-parallel: 10
    defaults:
      run:
        working-directory: ${{ matrix.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Compute Terraform version
        id: compute-tf-version
        run: |
          set -euo pipefail

          constraint=$("$GITHUB_WORKSPACE/scripts/terraform/compute-tf-version.sh" "$GITHUB_WORKSPACE/${{ matrix.path }}")
          echo "${{ matrix.name }} Constraint found: $constraint"
          echo "tf_version=$(echo "$constraint" | xargs)" >> "$GITHUB_OUTPUT"

      - name: Ensure plugin cache dir exists
        run: mkdir -p "${{ env.TF_PLUGIN_CACHE_DIR }}"

      - name: Terraform cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: tf-${{ runner.os }}-${{ steps.compute-tf-version.outputs.tf_version }}

      - name: "Setup Terraform ${{ steps.compute-tf-version.outputs.tf_version }}"
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ steps.compute-tf-version.outputs.tf_version }}

      - name: Show Terraform version
        run: terraform version

      - name: terraform fmt
        id: fmt
        run: terraform fmt -check -recursive -diff
        # -check: exit 1 when files need formatting (non-destructive)
        # -diff:  print the diff so reviewers see what needs fixing

      - name: terraform init
        id: init
        run: |
          terraform init \
            -backend=false \
            -input=false \
            -no-color
        # -backend=false: skip remote-state init

      - name: terraform validate
        id: validate
        run: terraform validate -no-color

      - name: Setup TFLint ${{ env.TFLINT_VERSION }}
        uses: terraform-linters/setup-tflint@6770de8d186019a148cc2b144e8bfa627f7d4aa8
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: Cache TFLint plugins
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.TFLINT_PLUGIN_DIR }}
          key: tflint-${{ env.TFLINT_VERSION }}-${{ hashFiles('**/.tflint.hcl') }}
          restore-keys: |
            tflint-${{ env.TFLINT_VERSION }}-
            tflint-

      - name: Init TFLint
        run: |
          # AWS Tflint rules: https://github.com/terraform-linters/tflint-ruleset-aws/blob/master/docs/rules/README.md
          # Keep plugins under workspace to avoid hardcoded runner-specific home paths.
          # Use module-local .tflint.hcl when present; otherwise copy the repo-level config
          # into the module folder so `tflint --init` can download the required plugins.

          mkdir -p "${{ env.TFLINT_PLUGIN_DIR }}"

          # Check if .tflint.hcl exists in the module directory or the repo root. 
          # If it exists in the repo root but not in the module directory, 
          # copy it to the module directory. 
          # Then run `tflint --init` to initialize TFLint with the configuration file, 
          # which will download the required plugins based on the configuration.
          if [ -f .tflint.hcl ] || [ -f "$GITHUB_WORKSPACE/.tflint.hcl" ]; then
            if [ ! -f .tflint.hcl ] && [ -f "$GITHUB_WORKSPACE/.tflint.hcl" ]; then
              cp "$GITHUB_WORKSPACE/.tflint.hcl" .
            fi
            tflint --init
          fi

      - name: Run TFLint
        id: lint
        run: tflint --format compact --no-color

  terraform-ci-gate:
    name: Terraform CI Gate
    if: always()
    needs: terraform-checks
    runs-on: ubuntu-24.04
    steps:
      - name: Check matrix jobs status
        run: |
          result="${{ needs.terraform-checks.result }}"
          if [[ "$result" != "success" ]]; then
            echo "::error title=Terraform CI Gate::One or more Terraform state checks failed (result: $result)"
            exit 1
          fi
          echo "Terraform CI Gate: all Terraform state checks passed."
